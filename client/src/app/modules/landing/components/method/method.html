<section id="method" class="method" aria-labelledby="method-title">
  <div class="container">
    <header class="section-head" appReveal="fade">
      <p class="eyebrow">{{ 'landing.method.eyebrow' | t }}</p>
      <h2 id="method-title">{{ 'landing.method.title' | t }}</h2>
    </header>

    <div class="method__cards" appReveal="stagger">
      @for (card of cards(); track card.key; let i = $index) {
        <article class="method-card spotlight-card" appSpotlight>
          <span class="method-card__num">{{ (i + 1).toString().padStart(2, '0') }}</span>
          <span class="method-card__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path [attr.d]="iconFor(card.key)" />
            </svg>
          </span>
          <h3 class="method-card__title">{{ card.title }}</h3>
          <p class="method-card__body">{{ card.body }}</p>
        </article>
      }
    </div>

    <blockquote class="pull-quote method__closing" appReveal="fade">
      {{ 'landing.method.closingQuote' | t }}
    </blockquote>
  </div>
</section>
