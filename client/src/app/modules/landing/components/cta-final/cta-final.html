<section id="cta-final" class="cta-final" aria-labelledby="cta-final-title">
  <div class="cta-final__lamp" aria-hidden="true"></div>
  <div class="container">
    <div class="cta-final__inner" appReveal="fade">
      <h2 id="cta-final-title" class="cta-final__title">
        {{ 'landing.finalCta.title' | t }}
      </h2>
      <p class="cta-final__sub">{{ 'landing.finalCta.sub' | t }}</p>
      <div class="cta-final__buttons">
        <a class="btn btn-gold btn-lg" appMagnetic href="#hero">
          {{ 'landing.finalCta.primary' | t }}
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12" />
            <polyline points="12 5 19 12 12 19" />
          </svg>
        </a>
        <a class="btn btn-ghost btn-lg" href="tel:800141359">
          {{ 'landing.finalCta.secondary' | t }}
        </a>
      </div>
      <p class="cta-final__microcopy">{{ 'landing.finalCta.microcopy' | t }}</p>
    </div>
  </div>
</section>
