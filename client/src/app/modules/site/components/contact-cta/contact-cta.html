<div class="contact-cta" [class.contact-cta--urgent]="variant === 'urgent'" appReveal="fade">
  <span class="contact-cta__glow" aria-hidden="true"></span>

  <div class="contact-cta__head">
    <p class="eyebrow contact-cta__eyebrow">
      {{ (variant === 'urgent' ? 'site.cta.urgentTitle' : 'site.cta.title') | t }}
    </p>
    <p class="contact-cta__sub">
      {{ (variant === 'urgent' ? 'site.cta.urgentSubtitle' : 'site.cta.subtitle') | t }}
    </p>
  </div>

  <div class="contact-cta__actions">
    <a class="btn btn-gold btn-lg contact-cta__call" appMagnetic [href]="tel()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z" />
      </svg>
      {{ 'site.cta.chiama' | t }}
    </a>

    <a class="btn btn-emerald btn-lg contact-cta__wa" [href]="whatsapp()" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
        <path d="M12.04 2a9.93 9.93 0 0 0-8.46 15.17L2 22l4.95-1.3A9.93 9.93 0 1 0 12.04 2zm0 1.86a8.06 8.06 0 0 1 6.84 12.33l-.2.32.78 2.85-2.93-.77-.31.18a8.06 8.06 0 1 1-4.18-15.13zm-3.2 4.2c-.16 0-.42.06-.64.3-.22.24-.85.83-.85 2.02s.87 2.34.99 2.5c.12.16 1.71 2.6 4.15 3.55 2.03.8 2.44.64 2.88.6.44-.04 1.42-.58 1.62-1.14.2-.56.2-1.04.14-1.14-.06-.1-.22-.16-.46-.28-.24-.12-1.42-.7-1.64-.78-.22-.08-.38-.12-.54.12-.16.24-.62.78-.76.94-.14.16-.28.18-.52.06-.24-.12-1.01-.37-1.93-1.19-.71-.64-1.19-1.42-1.33-1.66-.14-.24-.01-.37.11-.49.11-.11.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.54-1.3-.74-1.78-.2-.47-.4-.4-.54-.41h-.46z" />
      </svg>
      {{ 'site.cta.whatsapp' | t }}
    </a>
  </div>

  <a class="contact-cta__secondary focusable" routerLink="/contatti">
    {{ 'site.cta.verifica' | t }}
    <span aria-hidden="true">&rarr;</span>
  </a>

  <p class="contact-cta__microcopy">{{ 'site.cta.microcopy' | t }}</p>
</div>
