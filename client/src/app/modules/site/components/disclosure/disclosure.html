<div class="disclosure" [class.is-open]="open()" [class.disclosure--faq]="tone === 'faq'">
  <button
    type="button"
    class="disclosure__trigger focusable"
    (click)="toggle()"
    [attr.aria-expanded]="open()"
    [attr.aria-controls]="id"
  >
    <span class="disclosure__label">{{ label || (labelKey | t) }}</span>
    <span class="disclosure__chevron" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9" />
      </svg>
    </span>
  </button>

  <div class="disclosure__panel" [id]="id" role="region" [attr.aria-hidden]="!open()">
    <div class="disclosure__inner">
      <ng-content></ng-content>
    </div>
  </div>
</div>
